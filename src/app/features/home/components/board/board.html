<div class="board">
  <header>
    <div class="header">
      <div class="content">
        <div
          class="title"
          [class.title-readonly]="titleModel().titleReadonly"
          [class.title-edit]="!titleModel().titleReadonly"
        >
          <input
            type="text"
            autocomplete="off"
            [formField]="titleForm.title"
            [class.title-invalid]="isInvalidTitle"
            (click)="handleTitleClick()"
            (blur)="handleTitleBlur($event)"
            (keydown.escape)="handleEscapeTitle($event)"
          />
          @if (isInvalidTitle) {
            @for (error of titleForm.title().errors(); track error) {
              <div class="error">{{ error.message }}</div>
            }
          }
        </div>
      </div>
      <div class="home">
        <a [routerLink]="['']"><-Додому</a>
      </div>
      <div class="color-picker-wrapper">
        <input
          #inputColor
          type="color"
          class="color-input"
          [value]="titleModel().backgroundColor"
          (change)="handleColorChange($event)"
        />
        <button
          class="color-swatch"
          aria-label="Вибрати колір фону"
          [class.color_swatch_empty]="!titleModel().backgroundColor"
          [style]="{
            backgroundColor: titleModel().backgroundColor,
            color: titleModel().backgroundColor,
          }"
          (click)="inputColor.click()"
        ></button>
      </div>
    </div>
  </header>
  <ol
    class="container"
    (dragover)="handleListDragOver($event)"
    (dragleave)="handleListDragLeave($event)"
    (drop)="handleListDrop($event)"
  >
    @for (list of board()?.lists; track list.id; let i = $index) {
      @if (listPlaceholderIndex() === i) {
        <li class="list-placeholder"></li>
      }
      <li
        #listElement
        class="list-item"
        [class.dragging]="listDraggedId() === list.id"
        draggable="true"
        (dragstart)="handleListDragStart($event, list.id)"
        (dragend)="handleListDragEnd($event)"
      >
        <tr-list [listId]="list.id" (handleRemoteList)="handleRemoteList($event)"></tr-list>
      </li>
    }
    @if (listPlaceholderIndex() === board()?.lists?.length) {
      <li class="list-placeholder"></li>
    }
    <li class="list-item">
      <tr-list-create (handleCreateList)="handleCreateList($event)"></tr-list-create>
    </li>
  </ol>
</div>
